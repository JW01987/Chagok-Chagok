spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

logging:
  level:
    root: WARN
    com.chagok: WARN

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: 900000
  refresh-expiration-ms: 2592000000

springdoc:
  swagger-ui:
    enabled: false   # 운영 환경에서 Swagger 비활성화
